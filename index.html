<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>3D Mask</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/face_mesh.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; touch-action:none; }
#container { position:fixed; inset:0; }
#vid {
  position:absolute; inset:0; width:100%; height:100%;
  object-fit:cover; transform:scaleX(-1); z-index:1;
}
#three-canvas {
  position:absolute; inset:0; width:100%; height:100%;
  z-index:2; pointer-events:none;
}
#hand-canvas {
  position:absolute; inset:0; width:100%; height:100%;
  z-index:3; pointer-events:none;
}
#debug-canvas {
  position:absolute; inset:0; width:100%; height:100%;
  z-index:4; pointer-events:none;
}
#start-screen {
  position:fixed; inset:0; background:#000; z-index:20;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:14px;
  font-family:'Courier New',monospace;
}
#start-screen h1 {
  font-size:clamp(2rem,9vw,4rem); font-weight:400;
  letter-spacing:0.25em; color:#fff; text-transform:uppercase;
  text-shadow:0 0 80px rgba(100,200,255,0.5);
}
#start-screen p {
  font-size:0.65rem; letter-spacing:0.15em;
  color:rgba(255,255,255,0.28); text-align:center; line-height:2;
}
#start-btn {
  font-family:'Courier New',monospace; font-size:0.7rem;
  letter-spacing:0.3em; text-transform:uppercase;
  color:#000; background:#fff; border:none;
  padding:14px 42px; cursor:pointer; border-radius:2px; margin-top:6px;
}
#status {
  position:fixed; top:16px; left:20px; z-index:10;
  font-family:'Courier New',monospace; font-size:0.55rem;
  letter-spacing:0.15em; color:rgba(255,255,255,0.3);
}
#fps {
  position:fixed; top:16px; right:20px; z-index:10;
  font-family:'Courier New',monospace; font-size:0.55rem;
  letter-spacing:0.15em; color:rgba(255,255,255,0.2);
}
</style>
</head>
<body>

<div id="container">
  <video id="vid" playsinline autoplay muted></video>
  <canvas id="three-canvas"></canvas>
  <canvas id="hand-canvas"></canvas>
  <canvas id="debug-canvas"></canvas>
</div>

<div id="start-screen">
  <h1>3D Mask</h1>
  <p>Gesicht + Hände vor die Kamera.<br>Guy Fawkes Maske folgt deinem Gesicht.</p>
  <button id="start-btn" onclick="boot()">Starten</button>
</div>

<div id="status">Lade…</div>
<div id="fps">FPS <span id="fv">—</span></div>

<script>
// ═══════════════════════════════════════════════════════
// THREE.JS — transparent renderer
// ═══════════════════════════════════════════════════════
const threeCanvas = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, alpha: true, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0);
renderer.outputEncoding = THREE.sRGBEncoding;

const scene  = new THREE.Scene();
const camera = new THREE.OrthographicCamera(
  -window.innerWidth/2, window.innerWidth/2,
   window.innerHeight/2, -window.innerHeight/2,
  -2000, 2000
);
camera.position.z = 500;

function onResize() {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.left   = -window.innerWidth/2;
  camera.right  =  window.innerWidth/2;
  camera.top    =  window.innerHeight/2;
  camera.bottom = -window.innerHeight/2;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', onResize);

// Lighting — good for mask material
const ambient = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambient);
const key = new THREE.DirectionalLight(0xfff5e0, 1.4);
key.position.set(1, 2, 3);
scene.add(key);
const fill = new THREE.DirectionalLight(0x8899ff, 0.5);
fill.position.set(-2, -1, 1);
scene.add(fill);
const rim = new THREE.DirectionalLight(0xffffff, 0.3);
rim.position.set(0, -2, -1);
scene.add(rim);

// ═══════════════════════════════════════════════════════
// GLTF LOADER (inline — no import needed)
// ═══════════════════════════════════════════════════════
// We load GLTFLoader from CDN via script injection
let maskGroup = null;
let modelReady = false;

function loadGLTFLoader(cb) {
  const s = document.createElement('script');
  // Use a CDN that serves GLTFLoader compatible with r128
  s.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
  s.onload = cb;
  s.onerror = () => {
    document.getElementById('status').textContent = 'GLTFLoader Fehler';
  };
  document.head.appendChild(s);
}

function loadMask() {
  document.getElementById('status').textContent = 'Lade Maske…';
  const loader = new THREE.GLTFLoader();

  // Load relative to current HTML file — must be in same folder on GitHub
  loader.load(
    'Guyfawkes mask.glb',
    (gltf) => {
      maskGroup = gltf.scene;

      // Center and normalize the model
      const box = new THREE.Box3().setFromObject(maskGroup);
      const size = new THREE.Vector3();
      const center = new THREE.Vector3();
      box.getSize(size);
      box.getCenter(center);

      // Move model so its center is at origin
      maskGroup.position.sub(center);

      // Normalize to unit size — we'll scale it to face size later
      const maxDim = Math.max(size.x, size.y, size.z);
      maskGroup.scale.divideScalar(maxDim);

      // Initial rotation — will be tuned via debug
      maskGroup.rotation.x = 0;
      maskGroup.rotation.y = 0;
      maskGroup.rotation.z = 0;

      // Wrap in pivot group for rotation control
      const pivot = new THREE.Group();
      pivot.add(maskGroup);
      scene.add(pivot);
      window._maskPivot = pivot;

      modelReady = true;
      document.getElementById('status').textContent = 'Bereit';
    },
    (progress) => {
      const pct = Math.round(progress.loaded / progress.total * 100);
      document.getElementById('status').textContent = `Lade Maske… ${pct}%`;
    },
    (err) => {
      console.error('GLB load error:', err);
      document.getElementById('status').textContent = 'Maske nicht gefunden — GLB neben index.html legen';
    }
  );
}

// ═══════════════════════════════════════════════════════
// FACE → MASK UPDATE
// ═══════════════════════════════════════════════════════
let lastFaceLM = null;

function updateMask(lm) {
  if (!modelReady || !window._maskPivot) return;
  const pivot = window._maskPivot;
  const W = window.innerWidth, H = window.innerHeight;

  // All coords: mirror X, flip Y for Three.js
  function s(i) {
    return {
      x:  (1 - lm[i].x) * W - W/2,
      y: -(lm[i].y * H  - H/2),
      z:  -lm[i].z * W
    };
  }

  // Key landmarks
  const forehead   = s(10);   // top of head
  const chin       = s(152);  // bottom of chin
  const leftCheek  = s(234);  // left face edge
  const rightCheek = s(454);  // right face edge
  const noseTip    = s(4);    // nose tip
  const noseBase   = s(168);  // nose bridge/root

  // ── POSITION: center of face between forehead and chin ──
  const cx = (forehead.x + chin.x) / 2;
  const cy = (forehead.y + chin.y) / 2;
  pivot.position.set(cx, cy, 0);

  // ── SCALE: match actual face size ──
  const faceH = Math.hypot(chin.x - forehead.x, chin.y - forehead.y);
  const faceW = Math.hypot(rightCheek.x - leftCheek.x, rightCheek.y - leftCheek.y);
  const sc = Math.max(faceW, faceH) * 0.9;
  pivot.scale.set(sc, sc, sc * 0.4);

  // ── ROLL: tilt of face (forehead→chin angle) ──
  // Use raw (pre-mirror) landmarks for correct angle
  const rdx = -(lm[152].x - lm[10].x); // mirrored X
  const rdy =  (lm[152].y - lm[10].y); // Y (down positive)
  const roll = -Math.atan2(rdx, rdy);

  // ── YAW: left/right head turn ──
  const noseX     = lm[1].x;
  const lchX      = lm[234].x;
  const rchX      = lm[454].x;
  const fw        = Math.abs(rchX - lchX);
  if (fw < 0.01) return;
  const noseNorm  = (noseX - lchX) / fw;
  const yaw       = (0.5 - noseNorm) * Math.PI * 1.5; // mirrored: flip sign

  // ── PITCH: nod up/down ──
  const pitch = (lm[152].z - lm[10].z) * 4.0;

  pivot.rotation.set(pitch, yaw, roll);
  pivot.visible = true;
}

}

// ═══════════════════════════════════════════════════════
// HAND WEB CANVAS
// ═══════════════════════════════════════════════════════
const handCanvas = document.getElementById('hand-canvas');
const hCtx = handCanvas.getContext('2d');

function resizeHand() {
  handCanvas.width  = window.innerWidth;
  handCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeHand);
resizeHand();

const HAND_HUES  = [200,155,125,95,60];
const HAND_TIPS  = [4,8,12,16,20];
const HAND_BONES = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17],[0,17]];
let lastHandLM = [null,null];
let tick = 0;

function webLine(ax,ay,bx,by,hue,str) {
  const p = 0.5+0.5*Math.sin(tick+ax*0.007);
  hCtx.beginPath(); hCtx.moveTo(ax,ay); hCtx.lineTo(bx,by);
  hCtx.strokeStyle = `hsla(${hue},90%,70%,${str*(0.2+0.5*p)})`;
  hCtx.lineWidth = 0.5+p*1.5;
  hCtx.shadowColor = `hsl(${hue},100%,75%)`; hCtx.shadowBlur = 8+p*10;
  hCtx.stroke(); hCtx.shadowBlur = 0;
}

function drawHands() {
  const W = handCanvas.width, H = handCanvas.height;
  hCtx.clearRect(0,0,W,H);
  hCtx.lineCap = 'round';
  const tips = [null,null];

  for (let h=0; h<2; h++) {
    if (!lastHandLM[h]) continue;
    const all = lastHandLM[h].map(l => ({x:(1-l.x)*W, y:l.y*H}));
    hCtx.strokeStyle = 'rgba(255,255,255,0.12)';
    hCtx.lineWidth = 1; hCtx.shadowBlur = 0;
    for (const [a,b] of HAND_BONES) {
      hCtx.beginPath(); hCtx.moveTo(all[a].x,all[a].y); hCtx.lineTo(all[b].x,all[b].y); hCtx.stroke();
    }
    all.forEach((p,i) => {
      const fi=HAND_TIPS.indexOf(i), isTip=fi>=0, hue=isTip?HAND_HUES[fi]:160;
      hCtx.beginPath(); hCtx.arc(p.x,p.y,isTip?6:2,0,Math.PI*2);
      hCtx.fillStyle = isTip?`hsl(${hue},100%,70%)`:'rgba(255,255,255,0.3)';
      if (isTip) { hCtx.shadowColor=`hsl(${hue},100%,65%)`; hCtx.shadowBlur=16; }
      hCtx.fill(); hCtx.shadowBlur=0;
    });
    tips[h] = HAND_TIPS.map(ti=>all[ti]);
  }

  if (tips[0]&&tips[1]) {
    for (let fi=0;fi<5;fi++) {
      const a=tips[0][fi],b=tips[1][fi],d=Math.hypot(a.x-b.x,a.y-b.y);
      if(d<700) webLine(a.x,a.y,b.x,b.y,HAND_HUES[fi],1-d/700);
    }
  }
  for (let h=0;h<2;h++) {
    if (!tips[h]) continue;
    for (let fi=0;fi<5;fi++) for (let fj=fi+1;fj<5;fj++) {
      const a=tips[h][fi],b=tips[h][fj],d=Math.hypot(a.x-b.x,a.y-b.y);
      if(d<230) webLine(a.x,a.y,b.x,b.y,(HAND_HUES[fi]+HAND_HUES[fj])/2,(1-d/230)*0.75);
    }
  }
}

// ═══════════════════════════════════════════════════════
// DEBUG OVERLAY
// ═══════════════════════════════════════════════════════
const dbgCanvas = document.getElementById('debug-canvas');
const dbgCtx = dbgCanvas.getContext('2d');
function resizeDbg() { dbgCanvas.width=window.innerWidth; dbgCanvas.height=window.innerHeight; }
window.addEventListener('resize', resizeDbg); resizeDbg();

function drawDebug() {
  if (!lastFaceLM) { dbgCtx.clearRect(0,0,dbgCanvas.width,dbgCanvas.height); return; }
  const W=dbgCanvas.width, H=dbgCanvas.height;
  dbgCtx.clearRect(0,0,W,H);
  const lm = lastFaceLM;
  const pts = {
    'Stirn(10)':   {i:10,  c:'#ff0'},
    'Kinn(152)':   {i:152, c:'#0ff'},
    'LWange(234)': {i:234, c:'#f0f'},
    'RWange(454)': {i:454, c:'#f80'},
    'Nase(1)':     {i:1,   c:'#0f0'},
    'Mitte':       {x:(1-lm[10].x+1-lm[152].x)/2*W, y:(lm[10].y+lm[152].y)/2*H, c:'#fff', label:'Mitte'},
  };
  dbgCtx.font = 'bold 11px monospace';
  for (const [label, p] of Object.entries(pts)) {
    const x = p.x !== undefined ? p.x : (1-lm[p.i].x)*W;
    const y = p.y !== undefined ? p.y : lm[p.i].y*H;
    dbgCtx.beginPath(); dbgCtx.arc(x,y,8,0,Math.PI*2);
    dbgCtx.fillStyle = p.c; dbgCtx.fill();
    dbgCtx.fillStyle = '#000'; dbgCtx.fillText(label, x+10, y+4);
  }
}

// ═══════════════════════════════════════════════════════
// RENDER LOOP
// ═══════════════════════════════════════════════════════
let fpsT=performance.now(), fpsN=0;

function animate() {
  tick += 0.07;
  requestAnimationFrame(animate);
  if (lastFaceLM) updateMask(lastFaceLM);
  else if (window._maskPivot) window._maskPivot.visible = false;
  if (lastFaceLM && window._maskPivot) window._maskPivot.visible = true;
  drawHands();
  drawDebug();
  renderer.render(scene, camera);
  fpsN++;
  const now=performance.now();
  if(now-fpsT>500){
    document.getElementById('fv').textContent=Math.round(fpsN*1000/(now-fpsT));
    fpsT=now; fpsN=0;
  }
}

// ═══════════════════════════════════════════════════════
// MEDIAPIPE
// ═══════════════════════════════════════════════════════
const vid = document.getElementById('vid');

function initFace() {
  const m = new FaceMesh({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/${f}`});
  m.setOptions({maxNumFaces:1,refineLandmarks:false,minDetectionConfidence:0.5,minTrackingConfidence:0.5});
  m.onResults(r=>{ lastFaceLM = r.multiFaceLandmarks?.[0] ?? null; });
  setInterval(async()=>{ if(vid.readyState>=2) await m.send({image:vid}); }, 50);
}

function initHands() {
  const m = new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`});
  m.setOptions({maxNumHands:2,modelComplexity:0,minDetectionConfidence:0.6,minTrackingConfidence:0.5});
  m.onResults(r=>{
    lastHandLM=[null,null];
    (r.multiHandLandmarks??[]).forEach((lm,i)=>{
      lastHandLM[r.multiHandedness?.[i]?.label==='Left'?0:1]=lm;
    });
  });
  setInterval(async()=>{ if(vid.readyState>=2) await m.send({image:vid}); }, 33);
}

async function boot() {
  document.getElementById('start-screen').style.display='none';
  try {
    const s = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'user',width:{ideal:1280},height:{ideal:720}}
    });
    vid.srcObject=s; await vid.play();
    loadGLTFLoader(loadMask);
    initFace();
    initHands();
    animate();
  } catch(e) {
    alert('Kamera-Zugriff fehlgeschlagen:\n'+e.message+'\n\nBraucht localhost oder HTTPS.');
  }
}
</script>

</body>
</html>

<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>3D Mask</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/face_mesh.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; touch-action:none; }
#container { position:fixed; inset:0; }

/* Camera feed */
#vid {
position:absolute; inset:0; width:100%; height:100%;
object-fit:cover; transform:scaleX(-1); z-index:1;
}
/* Three.js canvas on top — transparent bg */
#three-canvas {
position:absolute; inset:0; width:100%; height:100%;
z-index:2; pointer-events:none;
}
/* Hand web canvas */
#hand-canvas {
position:absolute; inset:0; width:100%; height:100%;
z-index:3; pointer-events:none;
}

#start-screen {
position:fixed; inset:0; background:#000; z-index:20;
display:flex; flex-direction:column;
align-items:center; justify-content:center; gap:14px;
font-family:‘Courier New’,monospace;
}
#start-screen h1 {
font-size:clamp(2rem,9vw,4rem); font-weight:400;
letter-spacing:0.25em; color:#fff; text-transform:uppercase;
text-shadow:0 0 80px rgba(100,200,255,0.5);
}
#start-screen p {
font-size:0.65rem; letter-spacing:0.15em;
color:rgba(255,255,255,0.28); text-align:center; line-height:2;
}
#start-btn {
font-family:‘Courier New’,monospace; font-size:0.7rem;
letter-spacing:0.3em; text-transform:uppercase;
color:#000; background:#fff; border:none;
padding:14px 42px; cursor:pointer; border-radius:2px; margin-top:6px;
}
#fps {
position:fixed; top:16px; right:20px; z-index:10;
font-family:‘Courier New’,monospace; font-size:0.55rem;
letter-spacing:0.15em; color:rgba(255,255,255,0.25);
}
</style>

</head>
<body>

<div id="container">
  <video id="vid" playsinline autoplay muted></video>
  <canvas id="three-canvas"></canvas>
  <canvas id="hand-canvas"></canvas>
</div>

<div id="start-screen">
  <h1>3D Mask</h1>
  <p>Gesicht + Hände vor die Kamera.<br>3D Maske folgt deinem Gesicht.</p>
  <button id="start-btn" onclick="boot()">Starten</button>
</div>
<div id="fps">FPS <span id="fv">—</span></div>

<script>
// ═══════════════════════════════════════════════════════════════
// THREE.JS SETUP — transparent renderer over video
// ═══════════════════════════════════════════════════════════════
const threeCanvas = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({
  canvas: threeCanvas,
  alpha: true,          // transparent background — video shows through
  antialias: true
});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0);  // fully transparent

const scene  = new THREE.Scene();
const camera = new THREE.OrthographicCamera(
  -window.innerWidth/2,  window.innerWidth/2,
   window.innerHeight/2, -window.innerHeight/2,
  -1000, 1000
);
camera.position.z = 500;

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.left   = -window.innerWidth/2;
  camera.right  =  window.innerWidth/2;
  camera.top    =  window.innerHeight/2;
  camera.bottom = -window.innerHeight/2;
  camera.updateProjectionMatrix();
});

// Lighting
const ambient = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambient);
const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
dirLight.position.set(0.5, 1, 2);
scene.add(dirLight);
const fillLight = new THREE.DirectionalLight(0x8888ff, 0.4);
fillLight.position.set(-1, -0.5, 1);
scene.add(fillLight);

// ═══════════════════════════════════════════════════════════════
// BUILD GUY FAWKES MASK GEOMETRY
// Uses THREE shapes to construct a stylized mask
// ═══════════════════════════════════════════════════════════════
const maskGroup = new THREE.Group();
scene.add(maskGroup);

// Materials
const skinMat = new THREE.MeshPhongMaterial({
  color: 0xf0ede8, shininess: 30, specular: 0x444444,
  side: THREE.FrontSide
});
const darkMat = new THREE.MeshPhongMaterial({
  color: 0x111111, shininess: 10,
  side: THREE.FrontSide
});
const redMat = new THREE.MeshPhongMaterial({
  color: 0xcc6655, shininess: 20, transparent:true, opacity:0.7,
});
const pinkMat = new THREE.MeshPhongMaterial({
  color: 0xdd9988, shininess: 15
});

// Helper: lathe-like oval face base
function makeFaceBase() {
  // Simple rounded face shape using SphereGeometry, flattened
  const geo = new THREE.SphereGeometry(1, 32, 24, 0, Math.PI*2, 0, Math.PI);
  geo.scale(0.78, 1.0, 0.18); // flat mask
  return new THREE.Mesh(geo, skinMat);
}

// Eye hole (black ellipse cutout — rendered as dark disc)
function makeEyeHole(x) {
  const geo = new THREE.EllipseCurve(0,0, 0.18,0.13, 0, Math.PI*2);
  const pts = geo.getPoints(32);
  const shape = new THREE.Shape(pts);
  const geo2 = new THREE.ShapeGeometry(shape);
  const mesh = new THREE.Mesh(geo2, darkMat);
  mesh.position.set(x, 0.12, 0.01);
  return mesh;
}

// Mustache side
function makeMustacheSide(side) {
  const shape = new THREE.Shape();
  if (side === 'L') {
    shape.moveTo(0,0);
    shape.bezierCurveTo(-0.04, -0.1, -0.14, -0.14, -0.22, -0.08);
    shape.bezierCurveTo(-0.18, -0.04, -0.08, 0.02, 0, 0);
  } else {
    shape.moveTo(0,0);
    shape.bezierCurveTo(0.04, -0.1, 0.14, -0.14, 0.22, -0.08);
    shape.bezierCurveTo(0.18, -0.04, 0.08, 0.02, 0, 0);
  }
  const geo = new THREE.ShapeGeometry(shape);
  const mesh = new THREE.Mesh(geo, darkMat);
  mesh.position.set(0, -0.18, 0.015);
  return mesh;
}

// Goatee
function makeGoatee() {
  const shape = new THREE.Shape();
  shape.moveTo(-0.12, 0);
  shape.bezierCurveTo(-0.1, -0.18, 0, -0.25, 0, -0.25);
  shape.bezierCurveTo(0, -0.25, 0.1, -0.18, 0.12, 0);
  shape.bezierCurveTo(0.06, -0.05, -0.06, -0.05, -0.12, 0);
  const geo = new THREE.ShapeGeometry(shape);
  return new THREE.Mesh(geo, darkMat);
}

// Eyebrow
function makeEyebrow(side) {
  const curve = new THREE.QuadraticBezierCurve3(
    new THREE.Vector3(side*-0.22, 0, 0),
    new THREE.Vector3(0, 0.06, 0),
    new THREE.Vector3(side*0.22, 0, 0)
  );
  const pts = curve.getPoints(20);
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineBasicMaterial({color:0x111111, linewidth:3});
  return new THREE.Line(geo, mat);
}

// Nose
function makeNose() {
  const shape = new THREE.Shape();
  shape.moveTo(-0.06, 0.08);
  shape.lineTo(-0.09, -0.08);
  shape.quadraticCurveTo(-0.09,-0.12, -0.04,-0.12);
  shape.lineTo(0.04,-0.12);
  shape.quadraticCurveTo(0.09,-0.12, 0.09,-0.08);
  shape.lineTo(0.06, 0.08);
  shape.lineTo(-0.06, 0.08);
  const geo = new THREE.ShapeGeometry(shape);
  return new THREE.Mesh(geo, new THREE.MeshPhongMaterial({color:0xd4c4bc,shininess:5}));
}

// Mouth
function makeMouth() {
  const shape = new THREE.Shape();
  shape.moveTo(-0.18, 0.02);
  shape.quadraticCurveTo(0, -0.06, 0.18, 0.02);
  shape.quadraticCurveTo(0, 0.04, -0.18, 0.02);
  const geo = new THREE.ShapeGeometry(shape);
  return new THREE.Mesh(geo, new THREE.MeshPhongMaterial({color:0xcc8877,shininess:20}));
}

// Cheek rouge
function makeCheek(x) {
  const geo = new THREE.CircleGeometry(0.15, 24);
  const mesh = new THREE.Mesh(geo, redMat);
  mesh.position.set(x, 0.0, 0.005);
  return mesh;
}

// Assemble mask (in normalized space: face = ~1 unit tall, centered at 0,0)
const faceBase = makeFaceBase();
maskGroup.add(faceBase);

const eyeL = makeEyeHole(-0.28);
const eyeR = makeEyeHole(0.28);
maskGroup.add(eyeL, eyeR);

const browL = makeEyebrow(-1);
browL.position.set(-0.28, 0.27, 0.02);
const browR = makeEyebrow(1);
browR.position.set(0.28, 0.27, 0.02);
maskGroup.add(browL, browR);

const nose = makeNose();
nose.position.set(0, -0.08, 0.015);
maskGroup.add(nose);

const mouth = makeMouth();
mouth.position.set(0, -0.28, 0.015);
maskGroup.add(mouth);

const mustL = makeMustacheSide('L');
const mustR = makeMustacheSide('R');
maskGroup.add(mustL, mustR);

const goatee = makeGoatee();
goatee.position.set(0, -0.35, 0.015);
maskGroup.add(goatee);

const cheekL = makeCheek(-0.42);
const cheekR = makeCheek(0.42);
maskGroup.add(cheekL, cheekR);

// Face outline ring
const ringGeo = new THREE.TorusGeometry(0.8, 0.012, 8, 60);
ringGeo.scale(1, 1.28, 1);
const ring = new THREE.Mesh(ringGeo, new THREE.MeshPhongMaterial({color:0xc8b8a8,shininess:5,transparent:true,opacity:0.35}));
maskGroup.add(ring);

maskGroup.visible = false;

// ═══════════════════════════════════════════════════════════════
// HAND WEB CANVAS
// ═══════════════════════════════════════════════════════════════
const handCanvas = document.getElementById('hand-canvas');
const hCtx = handCanvas.getContext('2d');
let HW = handCanvas.width = window.innerWidth;
let HH = handCanvas.height = window.innerHeight;
window.addEventListener('resize', () => {
  HW = handCanvas.width = window.innerWidth;
  HH = handCanvas.height = window.innerHeight;
});

const HAND_HUES  = [200,155,125,95,60];
const HAND_TIPS  = [4,8,12,16,20];
const HAND_BONES = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17],[0,17]];

let lastHandLM = [null,null];
let tick2 = 0;

function hpx(lm) { return {x:(1-lm.x)*HW, y:lm.y*HH}; }

function webLine(ax,ay,bx,by,hue,str) {
  const p=0.5+0.5*Math.sin(tick2+ax*0.007);
  hCtx.beginPath(); hCtx.moveTo(ax,ay); hCtx.lineTo(bx,by);
  hCtx.strokeStyle=`hsla(${hue},90%,70%,${str*(0.2+0.5*p)})`;
  hCtx.lineWidth=0.5+p*1.5;
  hCtx.shadowColor=`hsl(${hue},100%,75%)`; hCtx.shadowBlur=8+p*10;
  hCtx.stroke(); hCtx.shadowBlur=0;
}

function drawHands() {
  hCtx.clearRect(0,0,HW,HH);
  hCtx.lineCap='round';
  const tips=[null,null];
  for(let h=0;h<2;h++){
    if(!lastHandLM[h]) continue;
    const all=lastHandLM[h].map(l=>hpx(l));
    hCtx.strokeStyle='rgba(255,255,255,0.12)'; hCtx.lineWidth=1; hCtx.shadowBlur=0;
    for(const [a,b] of HAND_BONES){hCtx.beginPath();hCtx.moveTo(all[a].x,all[a].y);hCtx.lineTo(all[b].x,all[b].y);hCtx.stroke();}
    all.forEach((p,i)=>{
      const fi=HAND_TIPS.indexOf(i),isTip=fi>=0,hue=isTip?HAND_HUES[fi]:160;
      hCtx.beginPath();hCtx.arc(p.x,p.y,isTip?6:2,0,Math.PI*2);
      hCtx.fillStyle=isTip?`hsl(${hue},100%,70%)`:'rgba(255,255,255,0.3)';
      if(isTip){hCtx.shadowColor=`hsl(${hue},100%,65%)`;hCtx.shadowBlur=16;}
      hCtx.fill();hCtx.shadowBlur=0;
    });
    tips[h]=HAND_TIPS.map(ti=>all[ti]);
  }
  if(tips[0]&&tips[1]){
    for(let fi=0;fi<5;fi++){const a=tips[0][fi],b=tips[1][fi],d=Math.hypot(a.x-b.x,a.y-b.y);if(d<700)webLine(a.x,a.y,b.x,b.y,HAND_HUES[fi],1-d/700);}
  }
  for(let h=0;h<2;h++){
    if(!tips[h]) continue;
    for(let fi=0;fi<5;fi++) for(let fj=fi+1;fj<5;fj++){
      const a=tips[h][fi],b=tips[h][fj],d=Math.hypot(a.x-b.x,a.y-b.y);
      if(d<230) webLine(a.x,a.y,b.x,b.y,(HAND_HUES[fi]+HAND_HUES[fj])/2,(1-d/230)*0.75);
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// FACE TRACKING → 3D MASK POSITIONING
// ═══════════════════════════════════════════════════════════════
let lastFaceLM = null;

// Key indices
// 10=forehead, 152=chin, 234=left cheek, 454=right cheek
// 33=left eye outer, 263=right eye outer

function updateMask(lm) {
  const W = window.innerWidth, H = window.innerHeight;

  // Convert to screen coords (mirrored)
  function s(i) { return { x:(1-lm[i].x)*W - W/2, y:-(lm[i].y*H - H/2), z:lm[i].z*W }; }

  const forehead  = s(10);
  const chin      = s(152);
  const leftEdge  = s(234);
  const rightEdge = s(454);

  // Center of face
  const cx = (forehead.x + chin.x) / 2;
  const cy = (forehead.y + chin.y) / 2;

  // Face dimensions → scale mask
  const faceH = Math.hypot(chin.x-forehead.x, chin.y-forehead.y);
  const faceW = Math.hypot(rightEdge.x-leftEdge.x, rightEdge.y-leftEdge.y);

  // Mask in normalized space is 2 units tall (sphere r=1)
  const scaleX = faceW * 0.72;
  const scaleY = faceH * 0.56;
  const scaleZ = scaleX * 0.3; // depth

  // Rotation: tilt (roll)
  const dx = chin.x - forehead.x;
  const dy = chin.y - forehead.y;
  const roll = Math.atan2(dx, dy);

  // Yaw from left/right cheek asymmetry
  const faceMidX = (leftEdge.x + rightEdge.x) / 2;
  const expectedMidX = (leftEdge.x + rightEdge.x) / 2;
  // Simple yaw: if face turned, cheek distances differ
  const leftDist  = Math.abs(lm[234].x - lm[1].x); // left cheek to nose
  const rightDist = Math.abs(lm[454].x - lm[1].x); // right cheek to nose
  const yaw = (rightDist - leftDist) * Math.PI * 0.8;

  // Pitch: forehead-chin vertical tilt
  const pitch = Math.atan2(lm[152].y - lm[10].y - 0.7, 0.5) * 0.3;

  maskGroup.position.set(cx, cy, 0);
  maskGroup.scale.set(scaleX, scaleY, scaleZ);
  maskGroup.rotation.set(pitch, yaw, roll);
  maskGroup.visible = true;
}

// ═══════════════════════════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════════════════════════
let fpsT=performance.now(), fpsN=0;

function animate() {
  tick2 += 0.07;
  requestAnimationFrame(animate);

  if (lastFaceLM) updateMask(lastFaceLM);
  else maskGroup.visible = false;

  drawHands();
  renderer.render(scene, camera);

  fpsN++;
  const now=performance.now();
  if(now-fpsT>500){
    document.getElementById('fv').textContent=Math.round(fpsN*1000/(now-fpsT));
    fpsT=now;fpsN=0;
  }
}

// ═══════════════════════════════════════════════════════════════
// MEDIAPIPE
// ═══════════════════════════════════════════════════════════════
const vid = document.getElementById('vid');

function initFace() {
  const m = new FaceMesh({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/${f}`});
  m.setOptions({maxNumFaces:1,refineLandmarks:false,minDetectionConfidence:0.5,minTrackingConfidence:0.5});
  m.onResults(r=>{ lastFaceLM = r.multiFaceLandmarks?.[0] ?? null; });
  setInterval(async()=>{if(vid.readyState>=2) await m.send({image:vid});}, 50);
}

function initHands() {
  const m = new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`});
  m.setOptions({maxNumHands:2,modelComplexity:0,minDetectionConfidence:0.6,minTrackingConfidence:0.5});
  m.onResults(r=>{
    lastHandLM=[null,null];
    (r.multiHandLandmarks??[]).forEach((lm,i)=>{lastHandLM[r.multiHandedness?.[i]?.label==='Left'?0:1]=lm;});
  });
  setInterval(async()=>{if(vid.readyState>=2) await m.send({image:vid});},33);
}

async function boot() {
  document.getElementById('start-screen').style.display='none';
  try {
    const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:1280},height:{ideal:720}}});
    vid.srcObject=s; await vid.play();
    initFace();
    initHands();
    animate();
  } catch(e) {
    alert('Kamera-Zugriff fehlgeschlagen:\n'+e.message+'\n\nBraucht localhost oder HTTPS.');
  }
}
</script>

</body>
</html>

<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hand Web</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: #000;
overflow: hidden;
font-family: ‘Courier New’, monospace;
touch-action: none;
}

#container {
position: relative;
width: 100vw;
height: 100dvh;
background: #000;
}

video {
position: absolute;
inset: 0;
width: 100%; height: 100%;
object-fit: cover;
transform: scaleX(-1);
pointer-events: none;
}

/* Background canvas (trails/web) */
#bg { position: absolute; inset: 0; }
/* Foreground canvas (skeleton) */
#fg { position: absolute; inset: 0; }

/* UI */
#ui {
position: fixed;
top: 0; left: 0; right: 0;
display: flex;
justify-content: space-between;
align-items: flex-start;
padding: 20px 24px;
pointer-events: none;
z-index: 10;
}

#title {
font-size: 0.65rem;
letter-spacing: 0.3em;
color: rgba(120,255,160,0.5);
text-transform: uppercase;
}

#info {
font-size: 0.6rem;
letter-spacing: 0.12em;
color: rgba(120,255,160,0.3);
text-align: right;
line-height: 1.8;
}

#start-screen {
position: fixed;
inset: 0;
background: #000;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 20px;
z-index: 20;
}

#start-screen h1 {
font-size: clamp(2rem, 8vw, 4rem);
font-weight: 400;
letter-spacing: 0.2em;
color: rgba(120,255,160,0.9);
text-transform: uppercase;
}

#start-screen p {
font-size: 0.7rem;
letter-spacing: 0.15em;
color: rgba(120,255,160,0.35);
text-align: center;
max-width: 280px;
line-height: 1.8;
}

#start-btn {
margin-top: 12px;
font-family: ‘Courier New’, monospace;
font-size: 0.75rem;
letter-spacing: 0.25em;
text-transform: uppercase;
color: #000;
background: rgba(120,255,160,0.9);
border: none;
padding: 16px 40px;
cursor: pointer;
border-radius: 2px;
}

#clear-btn {
position: fixed;
bottom: 24px;
right: 24px;
font-family: ‘Courier New’, monospace;
font-size: 0.6rem;
letter-spacing: 0.2em;
text-transform: uppercase;
color: rgba(120,255,160,0.4);
background: transparent;
border: 1px solid rgba(120,255,160,0.15);
padding: 10px 18px;
cursor: pointer;
z-index: 10;
border-radius: 2px;
transition: color 0.2s, border-color 0.2s;
}
#clear-btn:hover { color: rgba(120,255,160,0.9); border-color: rgba(120,255,160,0.5); }
</style>

</head>
<body>

<div id="container">
  <video id="vid" playsinline></video>
  <canvas id="bg"></canvas>
  <canvas id="fg"></canvas>
</div>

<div id="ui">
  <div id="title">Hand Web</div>
  <div id="info" id="info-box">
    Hände: <span id="s-hands">0</span><br>
    FPS: <span id="s-fps">—</span>
  </div>
</div>

<div id="start-screen">
  <h1>Hand Web</h1>
  <p>Bewege beide Hände vor der Kamera.<br>Gleiche Finger verbinden sich zu einem Netz.</p>
  <button id="start-btn" onclick="start()">Starten</button>
</div>

<button id="clear-btn" onclick="clearWeb()">Netz löschen</button>

<script>
// ── Config ──────────────────────────────────────────────────────────
const CFG = {
  trailLen:    60,       // max points per finger trail
  trailFade:   0.012,    // how fast old points fade
  webMaxDist:  600,      // px — max dist to draw web line
  pulseSpeed:  0.04,     // web pulse animation speed
  dotR:        5,        // fingertip dot radius
  glowBlur:    18,
  // Per-finger hue (green-ish organic palette)
  fingerHue:   [130, 150, 100, 80, 160],
};

// ── State ───────────────────────────────────────────────────────────
const vid    = document.getElementById('vid');
const bgC    = document.getElementById('bg');
const fgC    = document.getElementById('fg');
const bgCtx  = bgC.getContext('2d');
const fgCtx  = fgC.getContext('2d');

// trails[handIdx][fingerIdx] = [{x,y,age}]
let trails = [
  [[], [], [], [], []],
  [[], [], [], [], []]
];

// web segments: [{ax,ay,bx,by,age,phase}]
let webLines = [];

let hands, lastTime = 0, tick = 0;
let lastLandmarks = [null, null]; // per hand

const TIPS = [4, 8, 12, 16, 20];
const BONES = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],
  [0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],
  [5,9],[9,13],[13,17],[0,17]
];

// ── Resize ───────────────────────────────────────────────────────────
function resize() {
  bgC.width = fgC.width = window.innerWidth;
  bgC.height = fgC.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ── Coordinate mapping ───────────────────────────────────────────────
function lmToScreen(lm) {
  return {
    x: (1 - lm.x) * bgC.width,
    y: lm.y * bgC.height
  };
}

// ── Trail management ─────────────────────────────────────────────────
function pushTrail(handIdx, fingerIdx, x, y) {
  const t = trails[handIdx][fingerIdx];
  t.push({ x, y, age: 1.0 });
  if (t.length > CFG.trailLen) t.shift();
}

function fadeTrails() {
  for (let h = 0; h < 2; h++) {
    for (let f = 0; f < 5; f++) {
      const t = trails[h][f];
      for (let i = t.length - 1; i >= 0; i--) {
        t[i].age -= CFG.trailFade;
        if (t[i].age <= 0) t.splice(i, 1);
      }
    }
  }
}

// ── Web line management ───────────────────────────────────────────────
function addWebLine(ax, ay, bx, by) {
  webLines.push({ ax, ay, bx, by, age: 1.0, phase: Math.random() * Math.PI * 2 });
  // cap total lines
  if (webLines.length > 300) webLines.shift();
}

function fadeWebLines() {
  for (let i = webLines.length - 1; i >= 0; i--) {
    webLines[i].age -= 0.003;
    if (webLines[i].age <= 0) webLines.splice(i, 1);
  }
}

// ── Draw trails ───────────────────────────────────────────────────────
function drawTrails() {
  for (let h = 0; h < 2; h++) {
    for (let f = 0; f < 5; f++) {
      const t = trails[h][f];
      if (t.length < 2) continue;
      const hue = CFG.fingerHue[f];

      for (let i = 1; i < t.length; i++) {
        const a = t[i-1], b = t[i];
        const alpha = Math.min(a.age, b.age) * 0.6;
        bgCtx.beginPath();
        bgCtx.moveTo(a.x, a.y);
        bgCtx.lineTo(b.x, b.y);
        bgCtx.strokeStyle = `hsla(${hue}, 80%, 65%, ${alpha})`;
        bgCtx.lineWidth = Math.min(a.age, b.age) * 2.5;
        bgCtx.stroke();
      }
    }
  }
}

// ── Draw web lines ────────────────────────────────────────────────────
function drawWebLines() {
  tick += CFG.pulseSpeed;
  for (const l of webLines) {
    const pulse = 0.5 + 0.5 * Math.sin(tick + l.phase);
    const alpha = l.age * (0.15 + 0.2 * pulse);
    const hue   = 130;

    // Main line
    bgCtx.beginPath();
    bgCtx.moveTo(l.ax, l.ay);
    bgCtx.lineTo(l.bx, l.by);
    bgCtx.strokeStyle = `hsla(${hue}, 70%, 60%, ${alpha})`;
    bgCtx.lineWidth = 0.8 + pulse * 0.6;
    bgCtx.shadowColor = `hsla(${hue}, 90%, 70%, ${alpha * 0.8})`;
    bgCtx.shadowBlur = 6 + pulse * 8;
    bgCtx.stroke();
    bgCtx.shadowBlur = 0;
  }
}

// ── Draw skeleton ─────────────────────────────────────────────────────
function drawSkeleton(lm, alpha) {
  const pts = lm.map(l => lmToScreen(l));

  // Bones
  for (const [a, b] of BONES) {
    fgCtx.beginPath();
    fgCtx.moveTo(pts[a].x, pts[a].y);
    fgCtx.lineTo(pts[b].x, pts[b].y);
    fgCtx.strokeStyle = `rgba(120,255,160,${alpha * 0.25})`;
    fgCtx.lineWidth = 1;
    fgCtx.stroke();
  }

  // Tips
  TIPS.forEach((ti, fi) => {
    const p = pts[ti];
    const hue = CFG.fingerHue[fi];

    fgCtx.shadowColor = `hsl(${hue}, 90%, 70%)`;
    fgCtx.shadowBlur  = CFG.glowBlur;

    fgCtx.beginPath();
    fgCtx.arc(p.x, p.y, CFG.dotR, 0, Math.PI * 2);
    fgCtx.fillStyle = `hsla(${hue}, 80%, 75%, ${alpha})`;
    fgCtx.fill();

    fgCtx.shadowBlur = 0;
  });

  // Joint dots
  pts.forEach((p, i) => {
    if (TIPS.includes(i)) return;
    fgCtx.beginPath();
    fgCtx.arc(p.x, p.y, 2, 0, Math.PI * 2);
    fgCtx.fillStyle = `rgba(120,255,160,${alpha * 0.4})`;
    fgCtx.fill();
  });

  return pts;
}

// ── Main render loop ──────────────────────────────────────────────────
function render() {
  // Clear fg
  fgCtx.clearRect(0, 0, fgC.width, fgC.height);

  // Clear bg completely each frame (no fade, camera shows through)
  bgCtx.clearRect(0, 0, bgC.width, bgC.height);

  fadeWebLines();
  drawWebLines();

  // Draw skeletons + update trails
  const lms = lastLandmarks;
  const pts = [null, null];

  for (let h = 0; h < 2; h++) {
    if (!lms[h]) continue;
    pts[h] = drawSkeleton(lms[h], 0.85);
  }

  // Cross-hand web: same finger index
  if (pts[0] && pts[1]) {
    TIPS.forEach((ti, fi) => {
      const a = pts[0][ti], b = pts[1][ti];
      const dist = Math.hypot(a.x - b.x, a.y - b.y);
      if (dist < CFG.webMaxDist) {
        addWebLine(a.x, a.y, b.x, b.y);
      }
    });
  }

  // Single hand: connect all fingertips to each other (web)
  for (let h = 0; h < 2; h++) {
    if (!pts[h]) continue;
    for (let fi = 0; fi < TIPS.length; fi++) {
      for (let fj = fi + 1; fj < TIPS.length; fj++) {
        const a = pts[h][TIPS[fi]], b = pts[h][TIPS[fj]];
        const dist = Math.hypot(a.x - b.x, a.y - b.y);
        if (dist < 200) {
          addWebLine(a.x, a.y, b.x, b.y);
        }
      }
    }
  }

  requestAnimationFrame(render);
}

// ── MediaPipe ────────────────────────────────────────────────────────
function initMP() {
  hands = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`
  });
  hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.65,
    minTrackingConfidence: 0.55
  });
  hands.onResults(onResults);
}

function onResults(r) {
  const n = r.multiHandLandmarks?.length ?? 0;
  document.getElementById('s-hands').textContent = n;

  lastLandmarks = [null, null];

  if (n > 0) {
    r.multiHandLandmarks.forEach((lm, i) => {
      // MediaPipe returns 'Left'/'Right' from camera perspective (already mirrored in draw)
      const side = r.multiHandedness?.[i]?.label;
      const idx  = side === 'Left' ? 0 : 1;
      lastLandmarks[idx] = lm;
    });
  }

  const now = performance.now();
  document.getElementById('s-fps').textContent = Math.round(1000 / (now - lastTime));
  lastTime = now;
}

async function processLoop() {
  if (vid.readyState >= 2) await hands.send({ image: vid });
  requestAnimationFrame(processLoop);
}

// ── Start ─────────────────────────────────────────────────────────────
async function start() {
  document.getElementById('start-screen').style.display = 'none';
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    vid.srcObject = stream;
    await vid.play();
    initMP();
    render();
    processLoop();
  } catch(e) {
    alert('Kamera-Zugriff fehlgeschlagen:\n' + e.message + '\n\nÖffne die Seite über localhost oder HTTPS.');
  }
}

function clearWeb() {
  webLines = [];
  trails = [[[], [], [], [], []], [[], [], [], [], []]];
  bgCtx.clearRect(0, 0, bgC.width, bgC.height);
}
</script>

</body>
</html>

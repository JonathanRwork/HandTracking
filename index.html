<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Body Web</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/face_mesh.js" crossorigin="anonymous"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; touch-action:none; }
#container { position:fixed; inset:0; }
#vid {
  position:absolute; inset:0; width:100%; height:100%;
  object-fit:cover; transform:scaleX(-1); z-index:1;
}
#c {
  position:absolute; inset:0; width:100%; height:100%;
  pointer-events:none; z-index:2;
}
#start-screen {
  position:fixed; inset:0; background:#000; z-index:20;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:14px;
  font-family:'Courier New',monospace;
}
#start-screen h1 {
  font-size:clamp(2rem,9vw,4.5rem); font-weight:400;
  letter-spacing:0.25em; color:#fff; text-transform:uppercase;
  text-shadow:0 0 80px rgba(100,200,255,0.5);
}
#start-screen p {
  font-size:0.65rem; letter-spacing:0.15em;
  color:rgba(255,255,255,0.28); text-align:center; line-height:2;
}
#start-btn {
  font-family:'Courier New',monospace; font-size:0.7rem;
  letter-spacing:0.3em; text-transform:uppercase;
  color:#000; background:#fff; border:none;
  padding:14px 42px; cursor:pointer; border-radius:2px; margin-top:6px;
}
#fps {
  position:fixed; top:16px; right:20px; z-index:10;
  font-family:'Courier New',monospace; font-size:0.55rem;
  letter-spacing:0.15em; color:rgba(255,255,255,0.2);
}
</style>
</head>
<body>
<div id="container">
  <video id="vid" playsinline autoplay muted></video>
  <canvas id="c"></canvas>
</div>
<div id="start-screen">
  <h1>Body Web</h1>
  <p>Hände + Gesicht vor die Kamera.</p>
  <button id="start-btn" onclick="boot()">Starten</button>
</div>
<div id="fps">FPS <span id="fv">—</span></div>

<script>
const HAND_HUES = [200,155,125,95,60];
const FACE_HUE  = 280;
const FACE_HUE2 = 320;

const FACE_SILHOUETTE = [10,338,297,332,284,251,389,356,454,323,361,288,397,365,379,378,400,377,152,148,176,149,150,136,172,58,132,93,234,127,162,21,54,103,67,109];
const FACE_LEFT_EYE   = [33,7,163,144,145,153,154,155,133,173,157,158,159,160,161,246];
const FACE_RIGHT_EYE  = [362,382,381,380,374,373,390,249,263,466,388,387,386,385,384,398];
const FACE_LIPS       = [61,185,40,39,37,0,267,269,270,409,291,375,321,405,314,17,84,181,91,146];
const FACE_BROW_L     = [70,63,105,66,107,55,65,52,53,46];
const FACE_BROW_R     = [300,293,334,296,336,285,295,282,283,276];
const FACE_KEYS       = [33,133,362,263,61,291,1,4,10,152,234,454,70,300];

const HAND_TIPS  = [4,8,12,16,20];
const HAND_BONES = [
  [0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17],[0,17]
];
const CONTOURS = [
  {path:FACE_SILHOUETTE, hue:FACE_HUE,  a:0.3, w:0.8, close:true},
  {path:FACE_LEFT_EYE,   hue:190,       a:0.6, w:1.0, close:true},
  {path:FACE_RIGHT_EYE,  hue:190,       a:0.6, w:1.0, close:true},
  {path:FACE_LIPS,       hue:FACE_HUE2, a:0.55,w:1.2, close:true},
  {path:FACE_BROW_L,     hue:FACE_HUE,  a:0.4, w:0.9},
  {path:FACE_BROW_R,     hue:FACE_HUE,  a:0.4, w:0.9},
];

const vid  = document.getElementById('vid');
const canv = document.getElementById('c');
const ctx  = canv.getContext('2d');

let W, H, tick = 0;
let lastHandLM = [null, null];
let lastFaceLM = null;
let fpsT = performance.now(), fpsN = 0;

function resize() {
  W = canv.width  = window.innerWidth;
  H = canv.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function px(lm) { return { x:(1-lm.x)*W, y:lm.y*H }; }

// ── WEB LINE ─────────────────────────────────────────────────────────
function webLine(ax, ay, bx, by, hue, str) {
  const p = 0.5 + 0.5 * Math.sin(tick + ax*0.007);
  const a = str * (0.2 + 0.5*p);
  ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(bx,by);
  ctx.strokeStyle = `hsla(${hue},90%,70%,${a})`;
  ctx.lineWidth = 0.5 + p*1.5;
  ctx.shadowColor = `hsl(${hue},100%,75%)`; ctx.shadowBlur = 8+p*12;
  ctx.stroke(); ctx.shadowBlur = 0;
}

// ── HAND ─────────────────────────────────────────────────────────────
function drawHand(lm) {
  const all = lm.map(l => px(l));
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1; ctx.shadowBlur = 0;
  for (const [a,b] of HAND_BONES) {
    ctx.beginPath();
    ctx.moveTo(all[a].x,all[a].y);
    ctx.lineTo(all[b].x,all[b].y);
    ctx.stroke();
  }
  all.forEach((p,i) => {
    const fi = HAND_TIPS.indexOf(i), isTip = fi>=0;
    const hue = isTip ? HAND_HUES[fi] : 160;
    ctx.beginPath(); ctx.arc(p.x,p.y, isTip?6:2, 0, Math.PI*2);
    ctx.fillStyle = isTip ? `hsl(${hue},100%,70%)` : 'rgba(255,255,255,0.35)';
    if (isTip) { ctx.shadowColor=`hsl(${hue},100%,65%)`; ctx.shadowBlur=18; }
    ctx.fill(); ctx.shadowBlur=0;
    if (isTip) {
      const pulse = 0.5+0.5*Math.sin(tick*2.5+fi*1.3);
      ctx.beginPath(); ctx.arc(p.x,p.y,10+pulse*6,0,Math.PI*2);
      ctx.strokeStyle=`hsla(${hue},100%,75%,${0.08+pulse*0.22})`;
      ctx.lineWidth=1; ctx.stroke();
    }
  });
  return HAND_TIPS.map(ti => all[ti]);
}

// ── FACE ─────────────────────────────────────────────────────────────
function drawFace(lm) {
  const pts = lm.map(l => ({x:(1-l.x)*W, y:l.y*H}));
  const pulse = 0.5+0.5*Math.sin(tick*1.5);
  for (const c of CONTOURS) {
    ctx.beginPath();
    ctx.moveTo(pts[c.path[0]].x, pts[c.path[0]].y);
    for (let i=1;i<c.path.length;i++) ctx.lineTo(pts[c.path[i]].x,pts[c.path[i]].y);
    if (c.close) ctx.closePath();
    ctx.strokeStyle=`hsla(${c.hue},90%,70%,${c.a*(0.7+0.3*pulse)})`;
    ctx.lineWidth=c.w;
    ctx.shadowColor=`hsl(${c.hue},100%,75%)`; ctx.shadowBlur=5+pulse*6;
    ctx.stroke();
  }
  ctx.shadowBlur=0;
  ctx.fillStyle=`hsla(${FACE_HUE},80%,70%,0.4)`;
  for (let i=0;i<pts.length;i++) {
    ctx.beginPath(); ctx.arc(pts[i].x,pts[i].y,1.2,0,Math.PI*2); ctx.fill();
  }
  for (const ki of FACE_KEYS) {
    const p=pts[ki], kp=0.5+0.5*Math.sin(tick*3+ki*0.3);
    ctx.beginPath(); ctx.arc(p.x,p.y,4,0,Math.PI*2);
    ctx.fillStyle=`hsla(${FACE_HUE2},100%,72%,0.9)`;
    ctx.shadowColor=`hsl(${FACE_HUE2},100%,70%)`; ctx.shadowBlur=12;
    ctx.fill(); ctx.shadowBlur=0;
    ctx.beginPath(); ctx.arc(p.x,p.y,8+kp*4,0,Math.PI*2);
    ctx.strokeStyle=`hsla(${FACE_HUE2},100%,75%,${0.08+kp*0.2})`;
    ctx.lineWidth=1; ctx.stroke();
  }
  return FACE_KEYS.map(ki => pts[ki]);
}

// ── RENDER ────────────────────────────────────────────────────────────
function render() {
  tick += 0.07;
  ctx.clearRect(0,0,W,H);
  ctx.lineCap='round';

  const tips = [null,null];
  for (let h=0;h<2;h++) if (lastHandLM[h]) tips[h]=drawHand(lastHandLM[h]);

  let faceKeys = null;
  if (lastFaceLM) faceKeys = drawFace(lastFaceLM);

  // Hand↔Hand
  if (tips[0]&&tips[1]) {
    for (let fi=0;fi<5;fi++) {
      const a=tips[0][fi],b=tips[1][fi];
      const d=Math.hypot(a.x-b.x,a.y-b.y);
      if (d<700) webLine(a.x,a.y,b.x,b.y,HAND_HUES[fi],1-d/700);
    }
  }
  // Within hand
  for (let h=0;h<2;h++) {
    if (!tips[h]) continue;
    for (let fi=0;fi<5;fi++) for (let fj=fi+1;fj<5;fj++) {
      const a=tips[h][fi],b=tips[h][fj];
      const d=Math.hypot(a.x-b.x,a.y-b.y);
      if (d<230) webLine(a.x,a.y,b.x,b.y,(HAND_HUES[fi]+HAND_HUES[fj])/2,(1-d/230)*0.75);
    }
  }
  // Hand↔Face
  if (faceKeys) {
    for (let h=0;h<2;h++) {
      if (!tips[h]) continue;
      for (const tp of tips[h]) for (const fp of faceKeys) {
        const d=Math.hypot(tp.x-fp.x,tp.y-fp.y);
        if (d<350) webLine(tp.x,tp.y,fp.x,fp.y,(HAND_HUES[2]+FACE_HUE)/2,(1-d/350)*0.45);
      }
    }
  }

  fpsN++;
  const now=performance.now();
  if (now-fpsT>500) {
    document.getElementById('fv').textContent=Math.round(fpsN*1000/(now-fpsT));
    fpsT=now; fpsN=0;
  }
  requestAnimationFrame(render);
}

// ── MEDIAPIPE ─────────────────────────────────────────────────────────
function initHands() {
  const m = new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`});
  m.setOptions({maxNumHands:2,modelComplexity:0,minDetectionConfidence:0.6,minTrackingConfidence:0.5});
  m.onResults(r=>{
    lastHandLM=[null,null];
    (r.multiHandLandmarks??[]).forEach((lm,i)=>{
      lastHandLM[r.multiHandedness?.[i]?.label==='Left'?0:1]=lm;
    });
  });
  setInterval(async()=>{ if(vid.readyState>=2) await m.send({image:vid}); },33);
}

function initFace() {
  const m = new FaceMesh({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/${f}`});
  m.setOptions({maxNumFaces:1,refineLandmarks:false,minDetectionConfidence:0.5,minTrackingConfidence:0.5});
  m.onResults(r=>{ lastFaceLM=r.multiFaceLandmarks?.[0]??null; });
  setInterval(async()=>{ if(vid.readyState>=2) await m.send({image:vid}); },50);
}

async function boot() {
  document.getElementById('start-screen').style.display='none';
  try {
    const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:1280},height:{ideal:720}}});
    vid.srcObject=s; await vid.play();
    initHands(); initFace(); render();
  } catch(e) {
    alert('Kamera-Zugriff fehlgeschlagen:\n'+e.message+'\n\nBraucht localhost oder HTTPS.');
  }
}
</script>

</body>
</html>

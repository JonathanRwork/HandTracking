<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hand Web</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; touch-action: none; font-family: 'Courier New', monospace; }

#container { position: relative; width: 100vw; height: 100dvh; }

video {
position: absolute; inset: 0;
width: 100%; height: 100%;
object-fit: cover;
transform: scaleX(-1);
pointer-events: none;
}

canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

#vignette {
position: absolute; inset: 0;
background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.6) 100%);
pointer-events: none; z-index: 2;
}

#ui {
position: fixed; top: 0; left: 0; right: 0;
display: flex; justify-content: space-between; align-items: center;
padding: 18px 24px;
pointer-events: none; z-index: 10;
}
#title { font-size: 0.6rem; letter-spacing: 0.35em; color: rgba(255,255,255,0.2); text-transform: uppercase; }
#fps-box { font-size: 0.55rem; letter-spacing: 0.15em; color: rgba(255,255,255,0.15); }

#start-screen {
position: fixed; inset: 0; background: #000;
display: flex; flex-direction: column;
align-items: center; justify-content: center; gap: 16px; z-index: 20;
}
#start-screen h1 {
font-size: clamp(2.5rem, 10vw, 5rem);
font-weight: 400; letter-spacing: 0.25em; color: #fff; text-transform: uppercase;
text-shadow: 0 0 80px rgba(100,220,255,0.5);
}
#start-screen p {
font-size: 0.65rem; letter-spacing: 0.18em;
color: rgba(255,255,255,0.28); text-align: center; line-height: 2; max-width: 300px;
}
#start-btn {
margin-top: 8px; font-family: ‘Courier New’, monospace;
font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase;
color: #000; background: #fff; border: none;
padding: 15px 44px; cursor: pointer; border-radius: 2px;
}
#clear-btn {
position: fixed; bottom: 22px; right: 22px;
font-family: ‘Courier New’, monospace;
font-size: 0.55rem; letter-spacing: 0.2em; text-transform: uppercase;
color: rgba(255,255,255,0.2); background: transparent;
border: 1px solid rgba(255,255,255,0.1);
padding: 9px 16px; cursor: pointer; border-radius: 2px; z-index: 10;
transition: color 0.2s, border-color 0.2s;
}
#clear-btn:hover { color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.4); }
</style>

</head>
<body>
<div id="container">
  <video id="vid" playsinline></video>
  <canvas id="trail"></canvas>
  <canvas id="live"></canvas>
  <div id="vignette"></div>
</div>

<div id="ui">
  <div id="title">Hand · Web</div>
  <div id="fps-box">FPS <span id="s-fps">—</span></div>
</div>

<div id="start-screen">
  <h1>Hand Web</h1>
  <p>Beide Hände vor die Kamera.<br>Finger spinnen ein leuchtendes Netz.</p>
  <button id="start-btn" onclick="boot()">Starten</button>
</div>

<button id="clear-btn" onclick="clearAll()">Löschen</button>

<script>
const C = {
  fadeAlpha:  0.20,   // höher = schnelleres verblassen
  trailWidth: 5,
  webMaxDist: 700,
  innerDist:  230,
  pulseSpd:   0.07,
  glowBlur:   24,
  hues: [200, 155, 125, 95, 60], // Daumen→Kleiner: Blau, Cyan, Grün, Gelbgrün, Gelb
};

const vid    = document.getElementById('vid');
const trailC = document.getElementById('trail');
const liveC  = document.getElementById('live');
const tCtx   = trailC.getContext('2d');
const lCtx   = liveC.getContext('2d');

let hands, tick = 0, lastT = 0;
let lastLandmarks = [null, null];
let prevTips = [null, null];

const TIPS = [4, 8, 12, 16, 20];
const BONES = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],
  [0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],
  [5,9],[9,13],[13,17],[0,17]
];

function resize() {
  trailC.width = liveC.width = window.innerWidth;
  trailC.height = liveC.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function px(lm) {
  return { x: (1 - lm.x) * liveC.width, y: lm.y * liveC.height };
}

// ── TRAILS ──────────────────────────────────────────────────────────
function drawTrails(cur) {
  // Fast fade: semi-opaque black layer
  tCtx.fillStyle = `rgba(0,0,0,${C.fadeAlpha})`;
  tCtx.fillRect(0, 0, trailC.width, trailC.height);

  for (let h = 0; h < 2; h++) {
    if (!cur[h] || !prevTips[h]) continue;
    TIPS.forEach((_, fi) => {
      const a = prevTips[h][fi], b = cur[h][fi];
      if (!a || !b) return;
      const hue = C.hues[fi];

      // Fat glow trail
      tCtx.beginPath();
      tCtx.moveTo(a.x, a.y);
      tCtx.lineTo(b.x, b.y);
      tCtx.strokeStyle = `hsla(${hue}, 100%, 65%, 0.95)`;
      tCtx.lineWidth = C.trailWidth;
      tCtx.lineCap = 'round';
      tCtx.shadowColor = `hsl(${hue}, 100%, 70%)`;
      tCtx.shadowBlur = 18;
      tCtx.stroke();

      // Bright core
      tCtx.beginPath();
      tCtx.moveTo(a.x, a.y);
      tCtx.lineTo(b.x, b.y);
      tCtx.strokeStyle = `hsla(${hue}, 60%, 92%, 0.7)`;
      tCtx.lineWidth = 1.5;
      tCtx.shadowBlur = 0;
      tCtx.stroke();
    });
  }
}

// ── WEB ─────────────────────────────────────────────────────────────
function webLine(ax, ay, bx, by, hue, strength) {
  const pulse = 0.5 + 0.5 * Math.sin(tick + ax * 0.008 + ay * 0.006);
  const alpha = strength * (0.25 + 0.55 * pulse);
  const w     = 0.5 + pulse * 1.8;

  // Outer glow
  lCtx.beginPath();
  lCtx.moveTo(ax, ay);
  lCtx.lineTo(bx, by);
  lCtx.strokeStyle = `hsla(${hue}, 90%, 65%, ${alpha * 0.5})`;
  lCtx.lineWidth = w + 3;
  lCtx.shadowColor = `hsl(${hue}, 100%, 75%)`;
  lCtx.shadowBlur = 12 + pulse * 16;
  lCtx.stroke();

  // Core line
  lCtx.beginPath();
  lCtx.moveTo(ax, ay);
  lCtx.lineTo(bx, by);
  lCtx.strokeStyle = `hsla(${hue}, 85%, 78%, ${alpha})`;
  lCtx.lineWidth = w;
  lCtx.shadowBlur = 0;
  lCtx.stroke();
}

function drawWeb(tips) {
  lCtx.lineCap = 'round';

  // Cross-hand: same finger
  if (tips[0] && tips[1]) {
    TIPS.forEach((_, fi) => {
      const a = tips[0][fi], b = tips[1][fi];
      if (!a || !b) return;
      const d = Math.hypot(a.x - b.x, a.y - b.y);
      if (d < C.webMaxDist) webLine(a.x, a.y, b.x, b.y, C.hues[fi], 1 - d / C.webMaxDist);
    });
  }

  // Within each hand
  for (let h = 0; h < 2; h++) {
    if (!tips[h]) continue;
    for (let fi = 0; fi < 5; fi++) {
      for (let fj = fi + 1; fj < 5; fj++) {
        const a = tips[h][fi], b = tips[h][fj];
        if (!a || !b) continue;
        const d = Math.hypot(a.x - b.x, a.y - b.y);
        if (d < C.innerDist) {
          const hue = (C.hues[fi] + C.hues[fj]) / 2;
          webLine(a.x, a.y, b.x, b.y, hue, (1 - d / C.innerDist) * 0.75);
        }
      }
    }
  }
}

// ── SKELETON ─────────────────────────────────────────────────────────
function drawSkeleton(lm) {
  const all = lm.map(l => px(l));

  // Bones
  for (const [a, b] of BONES) {
    lCtx.beginPath();
    lCtx.moveTo(all[a].x, all[a].y);
    lCtx.lineTo(all[b].x, all[b].y);
    lCtx.strokeStyle = 'rgba(255,255,255,0.15)';
    lCtx.lineWidth = 1;
    lCtx.shadowColor = 'rgba(150,240,255,0.35)';
    lCtx.shadowBlur = 5;
    lCtx.stroke();
  }
  lCtx.shadowBlur = 0;

  // Joints + tips
  all.forEach((p, i) => {
    const fi = TIPS.indexOf(i);
    const isTip = fi >= 0;
    const hue = isTip ? C.hues[fi] : 160;
    const r   = isTip ? 7 : 2.5;

    // Glow
    lCtx.beginPath();
    lCtx.arc(p.x, p.y, r, 0, Math.PI * 2);
    lCtx.fillStyle = isTip ? `hsl(${hue}, 100%, 72%)` : 'rgba(255,255,255,0.45)';
    lCtx.shadowColor = isTip ? `hsl(${hue}, 100%, 65%)` : 'transparent';
    lCtx.shadowBlur = isTip ? C.glowBlur : 0;
    lCtx.fill();
    lCtx.shadowBlur = 0;

    // Pulsing ring on tips
    if (isTip) {
      const pulse = 0.5 + 0.5 * Math.sin(tick * 2.5 + fi * 1.3);
      lCtx.beginPath();
      lCtx.arc(p.x, p.y, 11 + pulse * 6, 0, Math.PI * 2);
      lCtx.strokeStyle = `hsla(${hue}, 100%, 75%, ${0.12 + pulse * 0.28})`;
      lCtx.lineWidth = 1.2;
      lCtx.stroke();

      // Second ring
      lCtx.beginPath();
      lCtx.arc(p.x, p.y, 18 + pulse * 4, 0, Math.PI * 2);
      lCtx.strokeStyle = `hsla(${hue}, 100%, 75%, ${0.05 + pulse * 0.1})`;
      lCtx.lineWidth = 0.8;
      lCtx.stroke();
    }
  });

  return TIPS.map(ti => all[ti]);
}

// ── RENDER LOOP ───────────────────────────────────────────────────────
function render() {
  tick += C.pulseSpd;
  lCtx.clearRect(0, 0, liveC.width, liveC.height);

  const curTips = [null, null];
  for (let h = 0; h < 2; h++) {
    if (lastLandmarks[h]) curTips[h] = drawSkeleton(lastLandmarks[h]);
  }

  drawWeb(curTips);
  drawTrails(curTips);

  prevTips = curTips.map(h => h ? [...h] : null);
  requestAnimationFrame(render);
}

// ── MEDIAPIPE ─────────────────────────────────────────────────────────
function initMP() {
  hands = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`
  });
  hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.65, minTrackingConfidence: 0.55 });
  hands.onResults(r => {
    lastLandmarks = [null, null];
    (r.multiHandLandmarks ?? []).forEach((lm, i) => {
      const side = r.multiHandedness?.[i]?.label;
      lastLandmarks[side === 'Left' ? 0 : 1] = lm;
    });
    const now = performance.now();
    document.getElementById('s-fps').textContent = Math.round(1000 / (now - lastT));
    lastT = now;
  });
}

async function processLoop() {
  if (vid.readyState >= 2) await hands.send({ image: vid });
  requestAnimationFrame(processLoop);
}

async function boot() {
  document.getElementById('start-screen').style.display = 'none';
  try {
    const s = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    vid.srcObject = s;
    await vid.play();
    initMP();
    render();
    processLoop();
  } catch(e) {
    alert('Kamera-Zugriff fehlgeschlagen:\n' + e.message + '\n\nBraucht localhost oder HTTPS.');
  }
}

function clearAll() {
  tCtx.clearRect(0, 0, trailC.width, trailC.height);
  prevTips = [null, null];
}
</script>

</body>
</html>

<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hand Web</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; touch-action: none; font-family: 'Courier New', monospace; }
  #c { position: fixed; inset: 0; width: 100vw; height: 100dvh; display: block; }
  video { position: fixed; opacity: 0; pointer-events: none; width: 1px; height: 1px; }

#start-screen {
position: fixed; inset: 0; background: #000;
display: flex; flex-direction: column;
align-items: center; justify-content: center; gap: 16px; z-index: 20;
}
#start-screen h1 {
font-size: clamp(2.5rem, 10vw, 5rem); font-weight: 400;
letter-spacing: 0.25em; color: #fff; text-transform: uppercase;
text-shadow: 0 0 80px rgba(100,220,255,0.5);
}
#start-screen p {
font-size: 0.65rem; letter-spacing: 0.18em;
color: rgba(255,255,255,0.3); text-align: center; line-height: 2;
}
#start-btn {
font-family: ‘Courier New’, monospace; font-size: 0.7rem;
letter-spacing: 0.3em; text-transform: uppercase;
color: #000; background: #fff; border: none;
padding: 15px 44px; cursor: pointer; border-radius: 2px; margin-top: 8px;
}
#clear-btn {
position: fixed; bottom: 22px; right: 22px; z-index: 10;
font-family: ‘Courier New’, monospace; font-size: 0.55rem;
letter-spacing: 0.2em; text-transform: uppercase;
color: rgba(255,255,255,0.25); background: transparent;
border: 1px solid rgba(255,255,255,0.12);
padding: 9px 16px; cursor: pointer; border-radius: 2px;
}
</style>

</head>
<body>

<canvas id="c"></canvas>
<video id="vid" playsinline></video>

<div id="start-screen">
  <h1>Hand Web</h1>
  <p>Beide Hände vor die Kamera.<br>Finger spinnen ein leuchtendes Netz.</p>
  <button id="start-btn" onclick="boot()">Starten</button>
</div>

<button id="clear-btn" onclick="clearTrails()">Löschen</button>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────
const C = {
  fadeAlpha:  0.18,   // trail fade speed (higher = faster)
  trailWidth: 5,
  webMaxDist: 700,
  innerDist:  230,
  pulseSpd:   0.07,
  glowBlur:   22,
  hues: [200, 155, 125, 95, 60],
};

// ── CANVAS SETUP ──────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const vid    = document.getElementById('vid');

// Offscreen canvas for trails only (transparent bg, no video)
const offscreen    = document.createElement('canvas');
const offCtx       = offscreen.getContext('2d');

let W, H;
function resize() {
  W = canvas.width  = offscreen.width  = window.innerWidth;
  H = canvas.height = offscreen.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ── STATE ─────────────────────────────────────────────────────────────
let hands, tick = 0, lastT = 0;
let lastLandmarks = [null, null];
let prevTips = [null, null];

const TIPS  = [4, 8, 12, 16, 20];
const BONES = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],
  [0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],
  [5,9],[9,13],[13,17],[0,17]
];

function px(lm) {
  return { x: (1 - lm.x) * W, y: lm.y * H };
}

// ── TRAILS (on offscreen, then composited) ────────────────────────────
function updateTrails(curTips) {
  // Fade existing trails
  offCtx.fillStyle = `rgba(0,0,0,${C.fadeAlpha})`;
  offCtx.fillRect(0, 0, W, H);

  for (let h = 0; h < 2; h++) {
    if (!curTips[h] || !prevTips[h]) continue;
    TIPS.forEach((_, fi) => {
      const a = prevTips[h][fi], b = curTips[h][fi];
      if (!a || !b) return;
      const hue = C.hues[fi];

      // Glow layer
      offCtx.beginPath();
      offCtx.moveTo(a.x, a.y);
      offCtx.lineTo(b.x, b.y);
      offCtx.strokeStyle = `hsla(${hue}, 100%, 65%, 0.9)`;
      offCtx.lineWidth = C.trailWidth;
      offCtx.lineCap = 'round';
      offCtx.shadowColor = `hsl(${hue}, 100%, 65%)`;
      offCtx.shadowBlur = 16;
      offCtx.stroke();

      // White core
      offCtx.beginPath();
      offCtx.moveTo(a.x, a.y);
      offCtx.lineTo(b.x, b.y);
      offCtx.strokeStyle = `hsla(${hue}, 50%, 95%, 0.65)`;
      offCtx.lineWidth = 1.5;
      offCtx.shadowBlur = 0;
      offCtx.stroke();
    });
  }
}

// ── WEB ───────────────────────────────────────────────────────────────
function webLine(ax, ay, bx, by, hue, strength) {
  const pulse = 0.5 + 0.5 * Math.sin(tick + ax * 0.007 + ay * 0.005);
  const alpha = strength * (0.25 + 0.55 * pulse);
  const w     = 0.5 + pulse * 1.8;

  ctx.beginPath();
  ctx.moveTo(ax, ay);
  ctx.lineTo(bx, by);
  ctx.strokeStyle = `hsla(${hue}, 90%, 65%, ${alpha * 0.5})`;
  ctx.lineWidth = w + 3;
  ctx.shadowColor = `hsl(${hue}, 100%, 75%)`;
  ctx.shadowBlur = 14 + pulse * 16;
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(ax, ay);
  ctx.lineTo(bx, by);
  ctx.strokeStyle = `hsla(${hue}, 85%, 78%, ${alpha})`;
  ctx.lineWidth = w;
  ctx.shadowBlur = 0;
  ctx.stroke();
}

function drawWeb(tips) {
  ctx.lineCap = 'round';

  if (tips[0] && tips[1]) {
    TIPS.forEach((_, fi) => {
      const a = tips[0][fi], b = tips[1][fi];
      if (!a || !b) return;
      const d = Math.hypot(a.x - b.x, a.y - b.y);
      if (d < C.webMaxDist) webLine(a.x, a.y, b.x, b.y, C.hues[fi], 1 - d / C.webMaxDist);
    });
  }

  for (let h = 0; h < 2; h++) {
    if (!tips[h]) continue;
    for (let fi = 0; fi < 5; fi++) {
      for (let fj = fi + 1; fj < 5; fj++) {
        const a = tips[h][fi], b = tips[h][fj];
        if (!a || !b) continue;
        const d = Math.hypot(a.x - b.x, a.y - b.y);
        if (d < C.innerDist) {
          const hue = (C.hues[fi] + C.hues[fj]) / 2;
          webLine(a.x, a.y, b.x, b.y, hue, (1 - d / C.innerDist) * 0.75);
        }
      }
    }
  }
}

// ── SKELETON ──────────────────────────────────────────────────────────
function drawSkeleton(lm) {
  const all = lm.map(l => px(l));

  for (const [a, b] of BONES) {
    ctx.beginPath();
    ctx.moveTo(all[a].x, all[a].y);
    ctx.lineTo(all[b].x, all[b].y);
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth = 1;
    ctx.shadowColor = 'rgba(150,240,255,0.3)';
    ctx.shadowBlur = 5;
    ctx.stroke();
  }
  ctx.shadowBlur = 0;

  all.forEach((p, i) => {
    const fi    = TIPS.indexOf(i);
    const isTip = fi >= 0;
    const hue   = isTip ? C.hues[fi] : 160;
    const r     = isTip ? 7 : 2.5;

    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fillStyle = isTip ? `hsl(${hue}, 100%, 72%)` : 'rgba(255,255,255,0.45)';
    ctx.shadowColor = isTip ? `hsl(${hue}, 100%, 65%)` : 'transparent';
    ctx.shadowBlur = isTip ? C.glowBlur : 0;
    ctx.fill();
    ctx.shadowBlur = 0;

    if (isTip) {
      const pulse = 0.5 + 0.5 * Math.sin(tick * 2.5 + fi * 1.3);
      ctx.beginPath();
      ctx.arc(p.x, p.y, 11 + pulse * 6, 0, Math.PI * 2);
      ctx.strokeStyle = `hsla(${hue}, 100%, 75%, ${0.12 + pulse * 0.28})`;
      ctx.lineWidth = 1.2;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(p.x, p.y, 19 + pulse * 4, 0, Math.PI * 2);
      ctx.strokeStyle = `hsla(${hue}, 100%, 75%, ${0.05 + pulse * 0.1})`;
      ctx.lineWidth = 0.8;
      ctx.stroke();
    }
  });

  return TIPS.map(ti => all[ti]);
}

// ── RENDER LOOP ───────────────────────────────────────────────────────
function render() {
  tick += C.pulseSpd;

  // 1. Draw video feed mirrored as background
  ctx.save();
  ctx.translate(W, 0);
  ctx.scale(-1, 1);
  if (vid.readyState >= 2) ctx.drawImage(vid, 0, 0, W, H);
  ctx.restore();

  // 2. Subtle darkening so overlays pop
  ctx.fillStyle = 'rgba(0,0,10,0.25)';
  ctx.fillRect(0, 0, W, H);

  // 3. Composite trail offscreen on top (trails have their own fade)
  ctx.drawImage(offscreen, 0, 0);

  // 4. Skeleton + web on top
  const curTips = [null, null];
  for (let h = 0; h < 2; h++) {
    if (lastLandmarks[h]) curTips[h] = drawSkeleton(lastLandmarks[h]);
  }
  drawWeb(curTips);

  // 5. Update trail offscreen
  updateTrails(curTips);
  prevTips = curTips.map(h => h ? [...h] : null);

  // 6. Vignette
  const vig = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, H*0.85);
  vig.addColorStop(0, 'transparent');
  vig.addColorStop(1, 'rgba(0,0,0,0.5)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);

  requestAnimationFrame(render);
}

// ── MEDIAPIPE ─────────────────────────────────────────────────────────
function initMP() {
  hands = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`
  });
  hands.setOptions({
    maxNumHands: 2, modelComplexity: 1,
    minDetectionConfidence: 0.65, minTrackingConfidence: 0.55
  });
  hands.onResults(r => {
    lastLandmarks = [null, null];
    (r.multiHandLandmarks ?? []).forEach((lm, i) => {
      lastLandmarks[r.multiHandedness?.[i]?.label === 'Left' ? 0 : 1] = lm;
    });
    const now = performance.now();
    lastT = now;
  });
}

async function processLoop() {
  if (vid.readyState >= 2) await hands.send({ image: vid });
  requestAnimationFrame(processLoop);
}

async function boot() {
  document.getElementById('start-screen').style.display = 'none';
  try {
    const s = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    vid.srcObject = s;
    await vid.play();
    initMP();
    render();
    processLoop();
  } catch(e) {
    alert('Kamera-Zugriff fehlgeschlagen:\n' + e.message + '\n\nBraucht localhost oder HTTPS.');
  }
}

function clearTrails() {
  offCtx.clearRect(0, 0, W, H);
  prevTips = [null, null];
}
</script>

</body>
</html>
